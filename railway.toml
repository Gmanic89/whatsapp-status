# railway.toml — Security Headers para sitio estático en Railway
# Subí este archivo al ROOT del repo (al lado de index.html)

[deploy]
  startCommand = "npx serve . -p $PORT"

[[headers]]
  path = "/*"

  [headers.values]
    # Forzar HTTPS por 1 año
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Evitar clickjacking
    X-Frame-Options = "SAMEORIGIN"

    # Evitar sniffing de MIME
    X-Content-Type-Options = "nosniff"

    # Referrer controlado
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Deshabilitar features innecesarias
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: https://www.google-analytics.com; frame-ancestors 'none'"
